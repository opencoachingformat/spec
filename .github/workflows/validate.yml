name: Validate OCF Examples

on:
  push:
    paths:
      - 'schema/**'
      - 'examples/**'
  pull_request:
    paths:
      - 'schema/**'
      - 'examples/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate examples against schema

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install AJV CLI
        run: npm install -g ajv-cli ajv-formats

      - name: Validate all example files
        run: |
          ajv validate \
            --spec=draft7 \
            -s schema/v1.json \
            -d "examples/*.ocf.json" \
            --all-errors \
            --strict=false \
            --verbose
