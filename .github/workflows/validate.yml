name: Validate OCF Examples

on:
  push:
    paths:
      - 'schema/**'
      - 'examples/**'
      - 'scripts/**'
      - 'package.json'
  pull_request:
    paths:
      - 'schema/**'
      - 'examples/**'
      - 'scripts/**'
      - 'package.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate examples (valid pass, invalid rejected)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run schema test suite
        run: npm test
