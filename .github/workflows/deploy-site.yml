name: Deploy Site

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'docs/specification-v1.adoc'
      - 'schema/v1.json'
      - 'examples/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy docs site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build docs site (asciidoctor + astro)
        working-directory: site
        run: npm run build

      - name: Assemble dist/
        run: |
          mkdir -p dist
          cp -r site/dist/. dist/
          echo "opencoachingformat.org" > dist/CNAME

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
